<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarsBot V9 - Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#0A0A0A; color:white; font-family:sans-serif; }
canvas { width:100%; }
</style>
</head>

<body>
<div class="max-w-6xl mx-auto p-4">

<h1 class="text-2xl font-bold mb-4">MarsBot V9 (Pro)</h1>

<input id="apiToken" placeholder="Deriv API Token"
class="w-full p-2 bg-black border mb-3">

<div class="flex gap-2 mb-3">
<button onclick="connectDeriv()" class="bg-blue-500 px-4 py-2 rounded">Connect</button>
<button onclick="toggleBot()" class="bg-green-500 px-4 py-2 rounded">Start / Stop</button>
<button onclick="resetBot()" class="bg-gray-600 px-4 py-2 rounded">Reset</button>
</div>

<div class="flex gap-3 mb-4 text-sm">
<label><input type="checkbox" id="confirmTrades"> Confirm Trades</label>
<select id="martingaleToggle" class="bg-black border px-2">
<option value="on">Martingale ON</option>
<option value="off">Martingale OFF</option>
</select>
</div>

<p id="statusMessage" class="text-yellow-400 mb-2"></p>
<p id="lastTrade" class="text-gray-400 mb-4"></p>

<canvas id="chart" height="120"></canvas>

<div class="grid grid-cols-2 gap-3 mt-4">
<div>Trades: <span id="totalTrades">0</span></div>
<div>Win Rate: <span id="winRate">0%</span></div>
<div>Profit: <span id="profit">$0</span></div>
<div>Loss: <span id="dailyLoss">$0</span></div>
<div>Mode: <span id="modeStatus">NORMAL</span></div>
<div>AI Confidence: <span id="aiConfidence">0</span></div>
</div>

<!-- Trade History -->
<div class="mt-6">
<h2 class="font-bold mb-2">Trade History</h2>
<table class="w-full text-sm">
<thead>
<tr class="text-gray-400">
<th>Time</th><th>Type</th><th>Result</th><th>P/L</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>
</div>

</div>

<script>
// ===== AUDIO =====
const winSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const lossSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

// ===== STATE =====
let ws, isRunning=false, isConnected=false, isTradeOpen=false;
let prices=[], lastTradeTime=0;
let trades=[];

// ===== CONFIG =====
let config={
  stake:1,
  martingale:true,
  cooldown:5000,
  lossLimit:30
};

// ===== AI =====
let ai={patterns:{}, lr:0.1, threshold:0};

// ===== METRICS =====
let metrics={trades:0,wins:0,profit:0,loss:0,mode:"NORMAL"};

// ===== STATUS =====
function setStatus(msg,color="yellow"){
  statusMessage.innerText=msg;
  statusMessage.className=`text-${color}-400 mb-2`;
}

// ===== CONNECT =====
function connectDeriv(){
  let token=apiToken.value.trim();
  if(!token) return setStatus("Enter API token","red");
  if(!confirm("Connect to Deriv?")) return;

  ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

  ws.onopen=()=>ws.send(JSON.stringify({authorize:token}));

  ws.onmessage=(msg)=>{
    let d=JSON.parse(msg.data);

    if(d.error) return setStatus(d.error.message,"red");

    if(d.authorize){
      isConnected=true;
      setStatus("Connected","green");
      subscribeTicks();
    }

    if(d.tick){
      prices.push(d.tick.quote);
      if(prices.length>100) prices.shift();
      drawChart();
      if(isRunning) runBot();
    }

    if(d.buy){
      isTradeOpen=true;
      subscribeContract(d.buy.contract_id);
    }

    if(d.proposal_open_contract && d.proposal_open_contract.is_sold){
      handleResult(d.proposal_open_contract);
      isTradeOpen=false;
    }
  };
}

// ===== SUBSCRIBE =====
function subscribeTicks(){
  ws.send(JSON.stringify({ticks:"R_50",subscribe:1}));
}

function subscribeContract(id){
  ws.send(JSON.stringify({
    proposal_open_contract:1,
    contract_id:id,
    subscribe:1
  }));
}

// ===== INDICATORS =====
function EMA(p,d){
  if(d.length===0) return 0;
  let k=2/(p+1), e=d[0];
  for(let i=1;i<d.length;i++) e=d[i]*k+e*(1-k);
  return e;
}

function RSI(d,p=14){
  if(d.length<p) return 50;
  let g=0,l=0;
  for(let i=d.length-p;i<d.length-1;i++){
    let diff=d[i+1]-d[i];
    if(diff>0) g+=diff; else l-=diff;
  }
  return 100-(100/(1+(g/(l||1))));
}

// ===== SIGNAL =====
function getSignal(){
  if(prices.length<30) return null;

  let emaF=EMA(9,prices);
  let emaS=EMA(21,prices);
  let rsi=RSI(prices);
  let vol=Math.abs(prices.at(-1)-prices.at(-2));

  if(vol<0.2) return null;

  if(rsi<35 && emaF>emaS) return "CALL";
  if(rsi>65 && emaF<emaS) return "PUT";

  return null;
}

// ===== BOT =====
function runBot(){
  if(isTradeOpen) return;

  if(!isConnected){
    setStatus("Not connected","red");
    return;
  }

  let now=Date.now();
  if(now-lastTradeTime<config.cooldown) return;

  if(metrics.loss>=config.lossLimit){
    metrics.mode="STOPPED";
    isRunning=false;
    setStatus("Session stopped","red");
    updateUI();
    return;
  }

  let sig=getSignal();
  if(!sig) return;

  if(confirmTrades.checked && !confirm(`Execute ${sig}?`)) return;

  placeTrade(sig);
  lastTradeTime=now;
}

// ===== TRADE =====
function placeTrade(dir){
  ws.send(JSON.stringify({
    buy:1,
    price:config.stake,
    parameters:{
      amount:config.stake,
      basis:"stake",
      contract_type:dir,
      currency:"USD",
      duration:1,
      duration_unit:"m",
      symbol:"R_50"
    }
  }));
}

// ===== RESULT =====
function handleResult(c){
  let p = Number(c.profit) || 0;

  metrics.trades++;
  if(p>0){ metrics.wins++; winSound.play(); }
  else lossSound.play();

  metrics.profit+=p;
  metrics.loss=Math.max(0,metrics.loss+p);

  lastTrade.innerText=`Last Trade: ${p>0?"WIN":"LOSS"} (${p.toFixed(2)})`;

  trades.unshift({
    time:new Date().toLocaleTimeString(),
    type:c.contract_type,
    result:p>0?"WIN":"LOSS",
    profit:p.toFixed(2)
  });

  if(trades.length>20) trades.pop();

  updateHistory();
  updateUI();
}

// ===== HISTORY =====
function updateHistory(){
  history.innerHTML=trades.map(t=>`
    <tr>
      <td>${t.time}</td>
      <td>${t.type}</td>
      <td>${t.result}</td>
      <td>${t.profit}</td>
    </tr>
  `).join("");
}

// ===== RESET =====
function resetBot(){
  if(!confirm("Reset bot?")) return;
  metrics={trades:0,wins:0,profit:0,loss:0,mode:"NORMAL"};
  trades=[];
  updateUI();
  updateHistory();
  setStatus("Reset complete","green");
}

// ===== CHART =====
function drawChart(){
  let c=chart, ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  if(prices.length<2) return;

  let max=Math.max(...prices), min=Math.min(...prices);
  let range=max-min||1;

  ctx.beginPath();
  prices.forEach((p,i)=>{
    let x=(i/prices.length)*c.width;
    let y=c.height-((p-min)/range)*c.height;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
}

// ===== UI =====
function updateUI(){
  totalTrades.innerText=metrics.trades;
  winRate.innerText=metrics.trades?((metrics.wins/metrics.trades)*100).toFixed(1)+"%":"0%";
  profit.innerText="$"+metrics.profit.toFixed(2);
  dailyLoss.innerText="$"+metrics.loss.toFixed(2);
  modeStatus.innerText=metrics.mode;
}

// ===== CONTROL =====
function toggleBot(){
  if(!isConnected) return setStatus("Connect first","red");
  if(!confirm(isRunning?"Stop bot?":"Start bot?")) return;

  isRunning=!isRunning;
  setStatus(isRunning?"Bot running":"Bot stopped","green");
}

martingaleToggle.onchange=e=>{
  config.martingale=e.target.value==="on";
};
</script>
</body>
</html>
