<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>MarsBot V5.1 — by Marshall</title>

<!-- React 18 + Babel -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Fonts: JetBrains Mono (numbers) + Inter (UI) -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>

<style>
/* ─── DESIGN TOKENS ────────────────────────────────────────────────── */
:root {
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  --text-xs:   clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.8125rem, 0.75rem + 0.3vw, 0.9375rem);
  --text-base: clamp(0.9375rem, 0.875rem + 0.25vw, 1rem);
  --text-lg:   clamp(1.0625rem, 0.975rem + 0.4vw, 1.25rem);
  --text-xl:   clamp(1.25rem, 1.1rem + 0.6vw, 1.5rem);

  --space-1:  0.25rem;
  --space-2:  0.5rem;
  --space-3:  0.75rem;
  --space-4:  1rem;
  --space-5:  1.25rem;
  --space-6:  1.5rem;
  --space-8:  2rem;
  --space-10: 2.5rem;

  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-2xl: 1.25rem;
  --radius-full: 9999px;

  --transition: 160ms cubic-bezier(0.16, 1, 0.3, 1);
}

/* ─── DARK THEME (DEFAULT) ─────────────────────────────────────────── */
[data-theme="dark"], :root {
  --bg:          #0d0e10;
  --surface:     #141518;
  --surface-2:   #1a1c20;
  --surface-3:   #22252b;
  --border:      oklch(from #fff l c h / 0.07);
  --border-focus: #4f98a3;

  --text:        #e2e4e9;
  --text-muted:  #7a7f8c;
  --text-faint:  #454952;

  --primary:     #4f98a3;
  --primary-h:   #3a8490;
  --primary-dim: oklch(from #4f98a3 l c h / 0.15);

  --green:       #3ecf64;
  --green-dim:   oklch(from #3ecf64 l c h / 0.12);
  --red:         #f55252;
  --red-dim:     oklch(from #f55252 l c h / 0.12);
  --amber:       #f5a623;
  --amber-dim:   oklch(from #f5a623 l c h / 0.12);
  --blue:        #4d9ef5;

  --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.3);
  --shadow-md: 0 4px 14px oklch(0 0 0 / 0.4);
  --shadow-lg: 0 12px 36px oklch(0 0 0 / 0.5);
}

/* ─── LIGHT THEME ─────────────────────────────────────────────────── */
[data-theme="light"] {
  --bg:          #f5f5f4;
  --surface:     #ffffff;
  --surface-2:   #f9f9f8;
  --surface-3:   #f0efee;
  --border:      oklch(from #000 l c h / 0.09);
  --border-focus: #01696f;

  --text:        #18181a;
  --text-muted:  #6b7280;
  --text-faint:  #b0b5bf;

  --primary:     #01696f;
  --primary-h:   #0c4e54;
  --primary-dim: oklch(from #01696f l c h / 0.1);

  --green:       #16a34a;
  --green-dim:   oklch(from #16a34a l c h / 0.1);
  --red:         #dc2626;
  --red-dim:     oklch(from #dc2626 l c h / 0.1);
  --amber:       #d97706;
  --amber-dim:   oklch(from #d97706 l c h / 0.1);
  --blue:        #2563eb;

  --shadow-sm: 0 1px 3px oklch(0.2 0.01 80 / 0.07);
  --shadow-md: 0 4px 14px oklch(0.2 0.01 80 / 0.09);
  --shadow-lg: 0 12px 36px oklch(0.2 0.01 80 / 0.12);
}

/* ─── BASE RESET ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  -webkit-text-size-adjust: none;
  text-size-adjust: none;
  -webkit-font-smoothing: antialiased;
  scroll-behavior: smooth;
  scroll-padding-top: var(--space-8);
}
body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--text);
  background: var(--bg);
  min-height: 100dvh;
  line-height: 1.55;
}
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
input, select, textarea { font: inherit; color: inherit; }
img { display: block; max-width: 100%; }
.sr-only { position: absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }

/* ─── FOCUS VISIBLE ───────────────────────────────────────────────── */
:focus-visible {
  outline: 2px solid var(--border-focus);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

/* ─── LAYOUT ──────────────────────────────────────────────────────── */
#app {
  max-width: 1400px;
  margin: 0 auto;
  padding: var(--space-4);
  padding-bottom: calc(var(--space-10) + env(safe-area-inset-bottom, 0px));
}
@media (min-width: 1024px) {
  #app { padding-bottom: var(--space-4); }
}

/* ─── CARD ────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-2xl);
  box-shadow: var(--shadow-sm);
}

/* ─── BUTTONS ─────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  font-size: var(--text-sm); font-weight: 600;
  border-radius: var(--radius-lg);
  border: 1px solid transparent;
  transition: background var(--transition), color var(--transition), box-shadow var(--transition), transform var(--transition);
  min-height: 44px; min-width: 44px; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.97); }
.btn-primary   { background: var(--primary);  color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-h); border-color: var(--primary-h); box-shadow: var(--shadow-sm); }
.btn-success   { background: var(--green-dim); color: var(--green); border-color: oklch(from var(--green) l c h / 0.3); }
.btn-success:hover { background: var(--green); color: #fff; }
.btn-danger    { background: var(--red-dim);   color: var(--red);   border-color: oklch(from var(--red) l c h / 0.3); }
.btn-danger:hover  { background: var(--red);   color: #fff; }
.btn-ghost     { background: var(--surface-3); color: var(--text-muted); border-color: var(--border); }
.btn-ghost:hover   { color: var(--text); background: var(--surface-2); }
.btn-sm { padding: var(--space-1) var(--space-3); font-size: var(--text-xs); min-height: 32px; }
.btn-icon { padding: var(--space-2); border-radius: var(--radius-md); }

/* ─── INPUTS ──────────────────────────────────────────────────────── */
.input {
  width: 100%;
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-3) var(--space-4);
  font-size: var(--text-sm);
  color: var(--text);
  transition: border-color var(--transition), box-shadow var(--transition);
  outline: none;
  min-height: 44px;
}
.input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--primary-dim);
}
.input-label {
  display: block;
  font-size: var(--text-xs);
  font-weight: 500;
  color: var(--text-muted);
  margin-bottom: var(--space-2);
  letter-spacing: 0.03em;
}

/* ─── STATUS BADGES ───────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px var(--space-3);
  font-size: var(--text-xs); font-weight: 600;
  border-radius: var(--radius-full);
  letter-spacing: 0.04em; text-transform: uppercase;
}
.badge-green  { background: var(--green-dim);  color: var(--green); }
.badge-red    { background: var(--red-dim);    color: var(--red); }
.badge-amber  { background: var(--amber-dim);  color: var(--amber); }
.badge-blue   { background: var(--primary-dim); color: var(--primary); }
.badge-muted  { background: var(--surface-3);  color: var(--text-muted); }
.badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.badge .dot.pulse { animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

/* ─── TYPOGRAPHY HELPERS ─────────────────────────────────────────── */
.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.text-green  { color: var(--green); }
.text-red    { color: var(--red); }
.text-amber  { color: var(--amber); }
.text-muted  { color: var(--text-muted); }
.text-faint  { color: var(--text-faint); }
.text-primary { color: var(--primary); }

/* ─── DIVIDER ─────────────────────────────────────────────────────── */
.divider { height: 1px; background: var(--border); margin: var(--space-4) 0; }

/* ─── TOGGLE ──────────────────────────────────────────────────────── */
.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-3) var(--space-4);
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  font-size: var(--text-sm);
  cursor: pointer;
  transition: background var(--transition);
  min-height: 44px;
}
.toggle-row:hover { background: var(--surface-2); }
.toggle-pill {
  display: inline-flex; align-items: center;
  width: 36px; height: 20px;
  border-radius: var(--radius-full);
  background: var(--surface-3);
  border: 1px solid var(--border);
  transition: background var(--transition);
  position: relative; flex-shrink: 0;
}
.toggle-pill.on { background: var(--primary); border-color: var(--primary); }
.toggle-knob {
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  top: 2px; left: 2px;
  transition: transform var(--transition);
  box-shadow: var(--shadow-sm);
}
.toggle-pill.on .toggle-knob { transform: translateX(16px); }

/* ─── TABS / BOTTOM NAV ───────────────────────────────────────────── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: var(--space-2) var(--space-3);
  padding-bottom: max(var(--space-2), env(safe-area-inset-bottom, var(--space-2)));
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: var(--space-1);
  z-index: 100;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
@media (min-width: 1024px) { .bottom-nav { display: none; } }
.nav-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px;
  padding: var(--space-2) var(--space-1);
  border-radius: var(--radius-lg);
  font-size: 10px; font-weight: 500;
  color: var(--text-muted);
  transition: color var(--transition), background var(--transition);
  min-height: 52px;
}
.nav-btn.active { color: var(--primary); background: var(--primary-dim); }
.nav-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

/* ─── DESKTOP LAYOUT ─────────────────────────────────────────────── */
.desktop-layout {
  display: none;
}
@media (min-width: 1024px) {
  .desktop-layout {
    display: grid;
    grid-template-columns: 200px 1fr 300px;
    gap: var(--space-4);
    align-items: start;
  }
}
.mobile-only { display: block; }
@media (min-width: 1024px) { .mobile-only { display: none; } }

/* ─── SIDEBAR ─────────────────────────────────────────────────────── */
.sidebar-btn {
  display: flex; align-items: center; gap: var(--space-3);
  width: 100%;
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-lg);
  font-size: var(--text-sm); font-weight: 500;
  color: var(--text-muted);
  transition: color var(--transition), background var(--transition);
  text-align: left;
  min-height: 44px;
}
.sidebar-btn:hover { color: var(--text); background: var(--surface-3); }
.sidebar-btn.active { color: var(--primary); background: var(--primary-dim); font-weight: 600; }
.sidebar-btn svg { width: 17px; height: 17px; flex-shrink: 0; }

/* ─── SPARKLINE CHART ────────────────────────────────────────────── */
.sparkline-wrap {
  background: var(--surface-3);
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
}

/* ─── STATS ───────────────────────────────────────────────────────── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--space-3);
}
@media (min-width: 640px) {
  .stat-grid { grid-template-columns: repeat(4, 1fr); }
}
.stat-card {
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: var(--space-4);
}
.stat-label { font-size: var(--text-xs); color: var(--text-muted); font-weight: 500; letter-spacing: 0.03em; margin-bottom: var(--space-2); }
.stat-value { font-size: var(--text-xl); font-weight: 700; font-family: var(--font-mono); }

/* ─── CONFIDENCE BAR ─────────────────────────────────────────────── */
.conf-bar-wrap {
  height: 8px;
  background: var(--surface-3);
  border-radius: var(--radius-full);
  overflow: hidden;
}
.conf-bar {
  height: 100%;
  border-radius: var(--radius-full);
  transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1), background 0.4s;
}

/* ─── TRADE LOG ITEM ─────────────────────────────────────────────── */
.log-item {
  display: flex; align-items: flex-start; gap: var(--space-3);
  padding: var(--space-3);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  background: var(--surface-3);
  font-size: var(--text-xs);
  transition: background var(--transition);
}
.log-item:hover { background: var(--surface-2); }
.log-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }

/* ─── TRADE HISTORY ──────────────────────────────────────────────── */
.trade-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-3) var(--space-4);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--surface-3);
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition);
  text-align: left; width: 100%;
}
.trade-row:hover { background: var(--surface-2); border-color: var(--primary); }
.trade-row .dir { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; }

/* ─── STRATEGY CARD ──────────────────────────────────────────────── */
.strategy-grid {
  display: grid;
  gap: var(--space-3);
  grid-template-columns: repeat(2, 1fr);
}
@media (min-width: 640px) {
  .strategy-grid { grid-template-columns: repeat(3, 1fr); }
}
.strategy-card {
  padding: var(--space-4);
  background: var(--surface-3);
  border: 2px solid var(--border);
  border-radius: var(--radius-xl);
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
}
.strategy-card.active { border-color: var(--primary); background: var(--primary-dim); }
.strategy-card:hover:not(.active) { border-color: oklch(from var(--primary) l c h / 0.35); }

/* ─── TOAST ───────────────────────────────────────────────────────── */
.toast-stack {
  position: fixed; top: var(--space-4); right: var(--space-4); z-index: 200;
  display: flex; flex-direction: column; gap: var(--space-2);
  pointer-events: none; max-width: 320px;
}
.toast {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-xl);
  font-size: var(--text-sm); font-weight: 500;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  animation: toastIn 0.22s ease both;
  pointer-events: auto;
}
@keyframes toastIn { from { opacity:0; transform: translateY(-10px) scale(0.95); } to { opacity:1; transform: none; } }
.toast-success { background: var(--surface-2); border-color: oklch(from var(--green) l c h / 0.25); color: var(--green); }
.toast-error   { background: var(--surface-2); border-color: oklch(from var(--red) l c h / 0.25);   color: var(--red); }
.toast-warn    { background: var(--surface-2); border-color: oklch(from var(--amber) l c h / 0.25); color: var(--amber); }
.toast-info    { background: var(--surface-2); border-color: oklch(from var(--primary) l c h / 0.25); color: var(--primary); }

/* ─── MODAL ───────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 150;
  background: oklch(0 0 0 / 0.65);
  display: grid; place-items: center;
  padding: var(--space-4);
  backdrop-filter: blur(4px);
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.modal-content { animation: slideUp 0.2s cubic-bezier(0.16,1,0.3,1) both; }
@keyframes slideUp { from { opacity:0; transform: translateY(16px) scale(0.97); } to { opacity:1; transform:none; } }

/* ─── OPEN CONTRACT BAR ──────────────────────────────────────────── */
.open-contract-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-3) var(--space-4);
  background: var(--amber-dim);
  border: 1px solid oklch(from var(--amber) l c h / 0.3);
  border-radius: var(--radius-xl);
  font-size: var(--text-sm);
  animation: pulse-bg 1.5s ease-in-out infinite;
}
@keyframes pulse-bg { 0%,100%{opacity:1;} 50%{opacity:0.75;} }

/* ─── SECTION ANIM ────────────────────────────────────────────────── */
.fade-in { animation: fadeIn 0.2s ease both; }

/* ─── SCROLLBAR ───────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--radius-full); }

/* ─── REDUCED MOTION ─────────────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>
<div id="app"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ══════════════════════════════════════════════════════════════════
   CONSTANTS & HELPERS
══════════════════════════════════════════════════════════════════ */
const WS_URL = 'wss://ws.binaryws.com/websockets/v3?app_id=1089';
const MAX_RECONNECTS = 5;
const RECONNECT_BASE_MS = 1500;

const DURATIONS = [
  { value: 1,  unit: 't', label: '1 Tick' },
  { value: 3,  unit: 't', label: '3 Ticks' },
  { value: 5,  unit: 't', label: '5 Ticks' },
  { value: 7,  unit: 't', label: '7 Ticks' },
  { value: 15, unit: 't', label: '15 Ticks' },
  { value: 30, unit: 's', label: '30 Sec' },
  { value: 60, unit: 's', label: '1 Min' },
  { value: 120,unit: 's', label: '2 Min' },
];

const SYMBOLS = [
  { value: 'R_10',    label: 'Volatility 10' },
  { value: 'R_25',    label: 'Volatility 25' },
  { value: 'R_50',    label: 'Volatility 50 ★' },
  { value: 'R_75',    label: 'Volatility 75' },
  { value: 'R_100',   label: 'Volatility 100' },
  { value: '1HZ10V',  label: 'Vol 10 (1s)' },
  { value: '1HZ50V',  label: 'Vol 50 (1s)' },
  { value: '1HZ100V', label: 'Vol 100 (1s)' },
];

const STRATEGIES = [
  { id: 'HYBRID', title: 'Hybrid', color: 'primary',
    desc: 'Multi-indicator fusion: EMA crossover + RSI + BB + MACD gate. Most balanced.' },
  { id: 'RSI',    title: 'RSI',    color: 'amber',
    desc: 'Pure RSI overbought/oversold reversal with momentum filter.' },
  { id: 'MACD',   title: 'MACD',   color: 'blue',
    desc: 'Histogram crossover with trend direction confirmation.' },
  { id: 'EMA',    title: 'EMA',    color: 'green',
    desc: 'Fast/slow EMA crossover. Clean and robust on V50.' },
  { id: 'BB',     title: 'Bollinger', color: 'red',
    desc: 'Price exceeds band → mean-reversion fade signal.' },
  { id: 'AI_ADAPTIVE', title: 'AI Adaptive', color: 'primary',
    desc: 'Dynamically selects best-performing strategy each session.' },
];

const DEFAULT_PREFS = {
  symbol: 'R_50',
  duration: '7|t',
  stake: '1.00',
  risk: 'Medium',
  strategy: 'HYBRID',
  minStrength: 72,
  autoMode: false,
  aiMode: false,
  autoAdjust: true,
  martingale: false,
  martingaleMultiplier: 2,
  maxMartingaleSteps: 3,
  maxDailyLossUSD: 10,
  maxDailyLossPct: false,
  tradeGapSec: 3,
  profile: 'Custom',
  token: '',
};

const parseDur = (key) =>
  DURATIONS.find(d => `${d.value}|${d.unit}` === key) || DURATIONS[3];

const fmt = (n, dp = 2) =>
  (n >= 0 ? '+' : '') + n.toFixed(dp);

function clamp(val, min, max) { return Math.min(max, Math.max(min, val)); }

/* ── In-memory store (no localStorage to avoid iframe sandbox issues) ── */
let _prefs = { ...DEFAULT_PREFS };
let _trades = [];
let _theme = 'dark';

/* ══════════════════════════════════════════════════════════════════
   SIGNAL ENGINE (improved indicators)
══════════════════════════════════════════════════════════════════ */
function calcEMA(arr, period) {
  if (arr.length < period) return null;
  const k = 2 / (period + 1);
  let ema = arr.slice(0, period).reduce((a, b) => a + b, 0) / period;
  for (let i = period; i < arr.length; i++) ema = arr[i] * k + ema * (1 - k);
  return ema;
}

function calcRSI(arr, period = 14) {
  if (arr.length < period + 1) return null;
  const recent = arr.slice(-(period + 1));
  let gains = 0, losses = 0;
  for (let i = 1; i < recent.length; i++) {
    const d = recent[i] - recent[i - 1];
    if (d >= 0) gains += d; else losses -= d;
  }
  const avgGain = gains / period;
  const avgLoss = losses / period;
  if (avgLoss === 0) return 100;
  const rs = avgGain / avgLoss;
  return 100 - 100 / (1 + rs);
}

function calcBB(arr, period = 20, mult = 2) {
  if (arr.length < period) return null;
  const slice = arr.slice(-period);
  const mean = slice.reduce((a, b) => a + b, 0) / period;
  const sd = Math.sqrt(slice.reduce((a, b) => a + (b - mean) ** 2, 0) / period);
  return { upper: mean + mult * sd, lower: mean - mult * sd, mid: mean, sd };
}

function calcMACD(arr) {
  if (arr.length < 26) return null;
  const ema12 = calcEMA(arr, 12);
  const ema26 = calcEMA(arr, 26);
  if (ema12 == null || ema26 == null) return null;
  const macdLine = ema12 - ema26;
  // Build MACD line history for the last 35 bars (enough for 9-period EMA of MACD)
  const macdHistory = [];
  const startIdx = Math.max(26, arr.length - 35);
  for (let i = startIdx; i <= arr.length; i++) {
    const slice = arr.slice(0, i);
    const e12 = calcEMA(slice, 12);
    const e26 = calcEMA(slice, 26);
    if (e12 != null && e26 != null) macdHistory.push(e12 - e26);
  }
  const signalLine = macdHistory.length >= 9
    ? calcEMA(macdHistory, 9)
    : macdHistory.reduce((a, b) => a + b, 0) / (macdHistory.length || 1);
  return { macdLine, signalLine, histogram: macdLine - signalLine };
}

function evaluateSignal(prices, strategy, minStrength, aiMode) {
  const n = prices.length;
  if (n < 10) return { direction: null, strength: 0, message: 'Collecting ticks…', indicators: {} };

  const last = prices[n - 1];
  const indicators = {};
  let votes = 0, maxVotes = 0;

  /* ── EMA ── */
  const emaFast = calcEMA(prices, 9);
  const emaSlow = calcEMA(prices, 21);
  if (emaFast != null && emaSlow != null) {
    indicators.ema = { fast: emaFast, slow: emaSlow };
    maxVotes++;
    if (emaFast > emaSlow) votes += 1;      // bullish
    else if (emaFast < emaSlow) votes -= 1; // bearish
  }

  /* ── RSI ── */
  const rsi = calcRSI(prices, 14);
  if (rsi != null) {
    indicators.rsi = rsi;
    maxVotes++;
    if (rsi < 35) votes += 1;       // oversold → CALL
    else if (rsi > 65) votes -= 1;  // overbought → PUT
  }

  /* ── BB ── */
  const bb = calcBB(prices, 20, 2);
  if (bb != null) {
    indicators.bb = bb;
    maxVotes++;
    if (last < bb.lower) votes += 1;
    else if (last > bb.upper) votes -= 1;
  }

  /* ── MACD gate ── */
  const macd = calcMACD(prices);
  if (macd != null) {
    indicators.macd = macd;
    // MACD gate: blocks signal if direction disagrees
    if (votes > 0 && macd.histogram < 0) votes = Math.max(0, votes - 1);
    if (votes < 0 && macd.histogram > 0) votes = Math.min(0, votes + 1);
  }

  /* ── Strategy override ── */
  let dir = null;
  const absVotes = Math.abs(votes);
  const voteRatio = maxVotes > 0 ? absVotes / maxVotes : 0;

  if (strategy === 'RSI' && rsi != null) {
    if (rsi < 30) { dir = 'CALL'; }
    else if (rsi > 70) { dir = 'PUT'; }
  } else if (strategy === 'EMA' && emaFast != null && emaSlow != null) {
    dir = emaFast > emaSlow ? 'CALL' : 'PUT';
  } else if (strategy === 'BB' && bb != null) {
    if (last < bb.lower) dir = 'CALL';
    else if (last > bb.upper) dir = 'PUT';
  } else if (strategy === 'MACD' && macd != null) {
    dir = macd.histogram > 0 ? 'CALL' : 'PUT';
  } else {
    // HYBRID or AI_ADAPTIVE
    if (votes > 0) dir = 'CALL';
    else if (votes < 0) dir = 'PUT';
  }

  const rawStrength = Math.round(clamp(45 + voteRatio * 54, 35, 99));
  const strength = rawStrength;

  if (!dir || strength < minStrength) {
    return {
      direction: null, strength,
      message: strength < minStrength
        ? `Signal below threshold (${strength}% < ${minStrength}%)`
        : 'Neutral — no clear signal',
      indicators,
    };
  }

  return {
    direction: dir, strength,
    message: aiMode ? `AI adaptive → ${dir} (${strength}%)` : `${dir} signal — ${strength}% confidence`,
    indicators,
  };
}

/* ══════════════════════════════════════════════════════════════════
   MARSBOT HOOK
══════════════════════════════════════════════════════════════════ */
function useMarsBot() {
  const [prefs, setPrefs] = useState({ ..._prefs });
  const [conn, setConn] = useState('disconnected'); // disconnected | connecting | connected
  const [running, setRunning] = useState(false);
  const [balance, setBalance] = useState(null);
  const [prices, setPrices] = useState([]);
  const [logs, setLogs] = useState([]);
  const [trades, setTrades] = useState([..._trades]);
  const [openContract, setOpenContract] = useState(null);
  const [selectedTrade, setSelectedTrade] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [dailyPnl, setDailyPnl] = useState(0);
  const [sessionStart, setSessionStart] = useState(null);

  // Refs
  const wsRef = useRef(null);
  const tickSubIdRef = useRef(null);
  const contractSubIdRef = useRef(null);
  const buyingRef = useRef(false);
  const reconnectAttemptsRef = useRef(0);
  const reconnectTimerRef = useRef(null);
  const lastTradeTsRef = useRef(0);
  const martingaleStepRef = useRef(0);
  const currentStakeRef = useRef(1);
  const dailyStartBalanceRef = useRef(null);

  // Stable refs for closures
  const runningRef = useRef(running);
  const prefsRef = useRef(prefs);
  const openContractRef = useRef(openContract);
  const dailyPnlRef = useRef(dailyPnl);

  useEffect(() => { runningRef.current = running; }, [running]);
  useEffect(() => { prefsRef.current = prefs; _prefs = prefs; }, [prefs]);
  useEffect(() => { openContractRef.current = openContract; }, [openContract]);
  useEffect(() => { dailyPnlRef.current = dailyPnl; }, [dailyPnl]);

  const pushLog = useCallback((msg, level = 'info') => {
    const entry = {
      id: Date.now() + Math.random(),
      msg, level,
      time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
    };
    setLogs(prev => [entry, ...prev].slice(0, 300));
  }, []);

  const toast = useCallback((msg, level = 'info') => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, msg, level }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);

  const updatePref = useCallback((key, value) => {
    setPrefs(p => {
      const next = { ...p, [key]: value };
      _prefs = next;
      return next;
    });
  }, []);

  const wsSend = useCallback((msg) => {
    if (wsRef.current?.readyState === WebSocket.OPEN) {
      wsRef.current.send(JSON.stringify(msg));
    }
  }, []);

  /* ── Daily loss guard ── */
  const isOverDailyLimit = useCallback(() => {
    const p = prefsRef.current;
    const limit = p.maxDailyLossUSD;
    if (!limit || limit <= 0) return false;
    return dailyPnlRef.current <= -Math.abs(limit);
  }, []);

  /* ── Place trade ── */
  const placeTrade = useCallback((dir) => {
    if (!wsRef.current || wsRef.current.readyState !== WebSocket.OPEN) {
      toast('Not connected', 'warn'); return;
    }
    if (buyingRef.current) return;
    if (openContractRef.current) { toast('Trade already open', 'warn'); return; }

    if (isOverDailyLimit()) {
      toast(`Daily loss limit reached ($${prefsRef.current.maxDailyLossUSD})`, 'error');
      setRunning(false); runningRef.current = false; return;
    }

    const now = Date.now();
    const gapMs = (prefsRef.current.tradeGapSec || 3) * 1000;
    if (now - lastTradeTsRef.current < gapMs) return;

    buyingRef.current = true;
    lastTradeTsRef.current = now;
    const p = prefsRef.current;
    const dur = parseDur(p.duration);
    const stake = currentStakeRef.current;

    wsSend({
      buy: 1,
      price: stake,
      parameters: {
        contract_type: dir,
        symbol: p.symbol,
        duration: dur.value,
        duration_unit: dur.unit,
        basis: 'stake',
        amount: stake,
        currency: 'USD',
      },
    });
    pushLog(`🚀 ${dir} · $${stake.toFixed(2)} · ${dur.label} · ${p.strategy}`, 'info');
  }, [isOverDailyLimit, pushLog, toast, wsSend]);

  /* ── Signal ── */
  const signal = useMemo(
    () => evaluateSignal(prices, prefs.strategy, prefs.minStrength, prefs.aiMode),
    [prices, prefs.strategy, prefs.minStrength, prefs.aiMode]
  );

  /* ── Auto-trade trigger ── */
  useEffect(() => {
    if (!signal.direction || !runningRef.current || !prefsRef.current.autoMode) return;
    if (openContractRef.current || buyingRef.current) return;
    placeTrade(signal.direction);
  }, [prices, signal.direction, placeTrade]);

  /* ── Connect ── */
  const connect = useCallback(() => {
    const p = prefsRef.current;
    const cleanToken = p.token?.replace(/[\s'"`]/g, '') || '';
    if (!cleanToken) { toast('Enter your Deriv API token first', 'warn'); return; }
    if (wsRef.current) wsRef.current.close();
    clearTimeout(reconnectTimerRef.current);

    const ws = new WebSocket(WS_URL);
    wsRef.current = ws;
    setConn('connecting');
    pushLog('Connecting to Deriv…');

    ws.onopen = () => {
      ws.send(JSON.stringify({ authorize: prefsRef.current.token.replace(/[\s'"`]/g, '') }));
    };

    ws.onerror = () => {
      pushLog('WebSocket error', 'error');
    };

    ws.onclose = (evt) => {
      setConn('disconnected');
      buyingRef.current = false;
      setOpenContract(null);

      const normal = evt.code === 1000 || evt.code === 1001;
      if (!normal && reconnectAttemptsRef.current < MAX_RECONNECTS) {
        const delay = RECONNECT_BASE_MS * Math.pow(2, reconnectAttemptsRef.current);
        reconnectAttemptsRef.current++;
        pushLog(`Reconnecting in ${(delay / 1000).toFixed(1)}s… (${reconnectAttemptsRef.current}/${MAX_RECONNECTS})`, 'warn');
        reconnectTimerRef.current = setTimeout(connect, delay);
      } else if (!normal) {
        pushLog('Max reconnect attempts reached', 'error');
        toast('Connection lost. Please reconnect manually.', 'error');
        reconnectAttemptsRef.current = 0;
      } else {
        pushLog('Disconnected', 'warn');
        reconnectAttemptsRef.current = 0;
      }
    };

    ws.onmessage = (evt) => {
      let data;
      try { data = JSON.parse(evt.data); } catch { return; }

      if (data.error) {
        buyingRef.current = false;
        pushLog(`⚠ ${data.error.message}`, 'error');
        toast(data.error.message, 'error');
        return;
      }

      switch (data.msg_type) {
        case 'authorize': {
          reconnectAttemptsRef.current = 0;
          setConn('connected');
          const bal = parseFloat(data.authorize?.balance);
          if (Number.isFinite(bal)) {
            setBalance(bal);
            dailyStartBalanceRef.current = bal;
          }
          wsSend({ balance: 1, subscribe: 1 });
          wsSend({ ticks: prefsRef.current.symbol, subscribe: 1 });
          setSessionStart(new Date());
          currentStakeRef.current = parseFloat(prefsRef.current.stake) || 1;
          martingaleStepRef.current = 0;
          pushLog(`✓ Authorized · Balance: $${isNaN(bal) ? '?' : bal.toFixed(2)}`);
          toast('Connected to Deriv', 'success');
          break;
        }
        case 'balance': {
          const b = parseFloat(data.balance?.balance);
          if (Number.isFinite(b)) setBalance(b);
          break;
        }
        case 'tick': {
          if (data.subscription?.id) tickSubIdRef.current = data.subscription.id;
          const q = parseFloat(data.tick?.quote);
          if (Number.isFinite(q)) setPrices(prev => [...prev, q].slice(-300));
          break;
        }
        case 'buy': {
          if (data.buy?.contract_id) {
            wsSend({ proposal_open_contract: 1, contract_id: data.buy.contract_id, subscribe: 1 });
          } else {
            buyingRef.current = false;
          }
          break;
        }
        case 'proposal_open_contract': {
          if (data.subscription?.id) contractSubIdRef.current = data.subscription.id;
          const c = data.proposal_open_contract;
          if (!c) break;
          const terminal = c.is_sold || c.status === 'won' || c.status === 'lost' || c.status === 'sold';
          if (terminal) {
            const profit = parseFloat(c.profit) || 0;
            const won = profit >= 0;
            const record = {
              id: c.contract_id,
              entry: c.entry_spot,
              exit: c.exit_tick_display_value || c.sell_spot,
              outcome: won ? 'win' : 'loss',
              profit,
              direction: c.contract_type,
              timestamp: new Date().toLocaleString(),
              strategy: prefsRef.current.strategy,
              stake: currentStakeRef.current,
            };
            setTrades(prev => {
              const next = [record, ...prev.filter(t => t.id !== record.id)].slice(0, 300);
              _trades = next;
              return next;
            });
            setDailyPnl(prev => prev + profit);
            setOpenContract(null);
            buyingRef.current = false;
            wsSend({ balance: 1 });

            // Martingale logic
            const p = prefsRef.current;
            if (p.martingale) {
              if (!won && martingaleStepRef.current < (p.maxMartingaleSteps || 3)) {
                martingaleStepRef.current++;
                currentStakeRef.current = parseFloat(p.stake) * Math.pow(p.martingaleMultiplier || 2, martingaleStepRef.current);
                pushLog(`↑ Martingale step ${martingaleStepRef.current} → $${currentStakeRef.current.toFixed(2)}`, 'warn');
              } else {
                martingaleStepRef.current = 0;
                currentStakeRef.current = parseFloat(p.stake) || 1;
              }
            }

            const label = won ? '✓ WIN' : '✗ LOSS';
            const clr = won ? 'success' : 'error';
            const newDailyPnl = dailyPnlRef.current + profit;
            pushLog(`${label} ${fmt(profit)} · Session P&L: ${fmt(newDailyPnl)}`, clr);
            toast(`${label} $${Math.abs(profit).toFixed(2)}`, clr);
          } else {
            setOpenContract(c);
          }
          break;
        }
      }
    };
  }, [pushLog, toast, wsSend]);

  /* ── Disconnect ── */
  const disconnect = useCallback(() => {
    clearTimeout(reconnectTimerRef.current);
    reconnectAttemptsRef.current = MAX_RECONNECTS; // prevent auto-reconnect
    if (tickSubIdRef.current) wsSend({ forget: tickSubIdRef.current });
    if (contractSubIdRef.current) wsSend({ forget: contractSubIdRef.current });
    wsRef.current?.close(1000, 'user');
    wsRef.current = null;
    tickSubIdRef.current = null;
    contractSubIdRef.current = null;
    buyingRef.current = false;
    setConn('disconnected');
    setRunning(false); runningRef.current = false;
    setOpenContract(null);
    setBalance(null);
    setPrices([]);
    reconnectAttemptsRef.current = 0;
  }, [wsSend]);

  /* ── Stake pref change: sync currentStakeRef when at base step ── */
  useEffect(() => {
    if (martingaleStepRef.current === 0) {
      currentStakeRef.current = parseFloat(prefs.stake) || 1;
    }
  }, [prefs.stake]);

  /* ── Symbol change: re-subscribe ── */
  useEffect(() => {
    if (conn !== 'connected') return;
    if (tickSubIdRef.current) wsSend({ forget: tickSubIdRef.current });
    setPrices([]);
    wsSend({ ticks: prefs.symbol, subscribe: 1 });
  }, [conn, prefs.symbol, wsSend]);

  /* ── Stats ── */
  const stats = useMemo(() => {
    const total = trades.length;
    const wins = trades.filter(t => t.outcome === 'win').length;
    const losses = total - wins;
    const pnl = trades.reduce((sum, t) => sum + t.profit, 0);
    const avgWin = wins > 0 ? trades.filter(t=>t.outcome==='win').reduce((s,t)=>s+t.profit,0)/wins : 0;
    const avgLoss = losses > 0 ? Math.abs(trades.filter(t=>t.outcome==='loss').reduce((s,t)=>s+t.profit,0)/losses) : 0;
    // Streak
    let streak = 0;
    for (const t of trades) {
      if (t.outcome === (trades[0]?.outcome)) streak++;
      else break;
    }
    return { total, wins, losses, winRate: total ? Math.round((wins/total)*100) : 0, pnl, avgWin, avgLoss, streak, streakType: trades[0]?.outcome || null };
  }, [trades]);

  const applyProfile = useCallback((profile) => {
    if (profile === 'Aggressive') {
      setPrefs(p => ({ ...p, profile, minStrength: 58, risk: 'High', stake: '2.00', tradeGapSec: 2 }));
    } else if (profile === 'Safe') {
      setPrefs(p => ({ ...p, profile, minStrength: 82, risk: 'Low', stake: '0.50', tradeGapSec: 5 }));
    } else if (profile === 'Balanced') {
      setPrefs(p => ({ ...p, profile, minStrength: 72, risk: 'Medium', stake: '1.00', tradeGapSec: 3 }));
    } else {
      setPrefs(p => ({ ...p, profile }));
    }
    toast(`Profile: ${profile}`, 'success');
  }, [toast]);

  const clearTrades = useCallback(() => {
    setTrades([]); _trades = [];
    setDailyPnl(0);
    toast('Trade history cleared', 'info');
  }, [toast]);

  return {
    prefs, conn, running, setRunning, balance, prices, logs, signal,
    trades, stats, openContract, selectedTrade, setSelectedTrade,
    toasts, updatePref, applyProfile, connect, disconnect, placeTrade,
    clearTrades, dailyPnl, sessionStart,
  };
}

/* ══════════════════════════════════════════════════════════════════
   SPARKLINE COMPONENT
══════════════════════════════════════════════════════════════════ */
function Sparkline({ prices, height = 100 }) {
  if (prices.length < 2) {
    return (
      <div style={{ height, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--text-faint)', fontSize:'var(--text-xs)' }}>
        Waiting for ticks…
      </div>
    );
  }
  const pts = prices.slice(-80);
  const min = Math.min(...pts);
  const max = Math.max(...pts);
  const range = max - min || 1;
  const W = 400, H = height;
  const points = pts.map((p, i) => {
    const x = (i / (pts.length - 1)) * W;
    const y = H - ((p - min) / range) * (H * 0.85) - H * 0.07;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');

  const lastPrice = pts[pts.length - 1];
  const firstPrice = pts[0];
  const trendColor = lastPrice >= firstPrice ? 'var(--green)' : 'var(--red)';
  const areaPoints = `0,${H} ${points} ${W},${H}`;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ width:'100%', height, display:'block' }}>
      <defs>
        <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={trendColor} stopOpacity="0.2"/>
          <stop offset="100%" stopColor={trendColor} stopOpacity="0.01"/>
        </linearGradient>
      </defs>
      <polygon points={areaPoints} fill="url(#sparkGrad)"/>
      <polyline points={points} fill="none" stroke={trendColor} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

/* ══════════════════════════════════════════════════════════════════
   PNL CHART
══════════════════════════════════════════════════════════════════ */
function PnLChart({ trades }) {
  if (trades.length < 2) {
    return <div style={{ height:100, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--text-faint)', fontSize:'var(--text-xs)' }}>No trades yet</div>;
  }
  const pts = trades.slice().reverse();
  let running = 0;
  const data = pts.map(t => { running += t.profit; return running; });
  const min = Math.min(0, ...data);
  const max = Math.max(0, ...data);
  const range = max - min || 1;
  const W = 400, H = 100;
  const points = data.map((v, i) => {
    const x = (i / (data.length - 1)) * W;
    const y = H - ((v - min) / range) * (H * 0.85) - 8;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');

  const finalPnl = data[data.length - 1];
  const lineColor = finalPnl >= 0 ? 'var(--green)' : 'var(--red)';
  const zeroY = H - ((0 - min) / range) * (H * 0.85) - 8;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ width:'100%', height:H, display:'block' }}>
      <line x1="0" y1={zeroY} x2={W} y2={zeroY} stroke="var(--border)" strokeWidth="1" strokeDasharray="4 4"/>
      <polyline points={points} fill="none" stroke={lineColor} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

            <div>
              <label className="input-label">Max Steps</label>
              <input className="input" type="number" min="1" max="6" step="1"
                value={prefs.maxMartingaleSteps} onChange={e => updatePref('maxMartingaleSteps', Number(e.target.value))}/>
            </div>
          </div>
        )}
      </div>

      {/* Toggles */}
      <div className="card" style={{ padding:'var(--space-4)' }}>
        <div style={{ fontWeight:600, fontSize:'var(--text-sm)', marginBottom:'var(--space-3)' }}>Bot Behavior</div>
        <div style={{ display:'flex', flexDirection:'column', gap:'var(--space-2)' }}>
          <Toggle label="Auto Trading" desc="Bot trades automatically on signal" checked={prefs.autoMode} onChange={v => updatePref('autoMode', v)}/>
          <Toggle label="AI Adaptive Mode" desc="Dynamically selects best strategy" checked={prefs.aiMode} onChange={v => updatePref('aiMode', v)}/>
          <Toggle label="Auto-adjust Strategies" desc="Shift strategy if win rate drops" checked={prefs.autoAdjust} onChange={v => updatePref('autoAdjust', v)}/>
        </div>
      </div>

      {/* Profiles */}
      <div className="card" style={{ padding:'var(--space-4)' }}>
        <div style={{ fontWeight:600, fontSize:'var(--text-sm)', marginBottom:'var(--space-3)' }}>Risk Profiles</div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:'var(--space-2)' }}>
          {['Safe', 'Balanced', 'Aggressive', 'Custom'].map(p => (
            <button key={p} className={`btn btn-sm ${prefs.profile === p ? 'btn-primary' : 'btn-ghost'}`}
              onClick={() => applyProfile(p)} style={{ width:'100%' }}>{p}</button>
          ))}
        </div>
        <div style={{ marginTop:'var(--space-3)', display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'var(--space-2)', fontSize:'var(--text-xs)', color:'var(--text-muted)' }}>
          <div style={{ background:'var(--surface-3)', padding:'var(--space-2)', borderRadius:'var(--radius-md)', textAlign:'center' }}>
            <div style={{ fontWeight:700, color:'var(--green)', marginBottom:2 }}>Safe</div>
            <div>Conf: 82%</div><div>Stake: $0.50</div>
          </div>
          <div style={{ background:'var(--surface-3)', padding:'var(--space-2)', borderRadius:'var(--radius-md)', textAlign:'center' }}>
            <div style={{ fontWeight:700, color:'var(--amber)', marginBottom:2 }}>Balanced</div>
            <div>Conf: 72%</div><div>Stake: $1.00</div>
          </div>
          <div style={{ background:'var(--surface-3)', padding:'var(--space-2)', borderRadius:'var(--radius-md)', textAlign:'center' }}>
            <div style={{ fontWeight:700, color:'var(--red)', marginBottom:2 }}>Aggressive</div>
            <div>Conf: 58%</div><div>Stake: $2.00</div>
          </div>
        </div>
      </div>
    </section>
  );
}

function Toggle({ label, desc, checked, onChange }) {
  return (
    <button type="button" className="toggle-row" onClick={() => onChange(!checked)}>
      <div>
        {label && <div style={{ fontWeight:500 }}>{label}</div>}
        {desc && <div style={{ fontSize:'var(--text-xs)', color:'var(--text-faint)', marginTop:2 }}>{desc}</div>}
      </div>
      <div className={`toggle-pill ${checked ? 'on' : ''}`}>
        <div className="toggle-knob"/>
      </div>
    </button>
  );
}

/* ══════════════════════════════════════════════════════════════════
   STATS PANEL
══════════════════════════════════════════════════════════════════ */
function StatsPanel({ stats, trades, sessionStart }) {
  const sessionDuration = sessionStart
    ? Math.floor((Date.now() - sessionStart.getTime()) / 60000)
    : 0;

  return (
    <section className="fade-in" style={{ display:'flex', flexDirection:'column', gap:'var(--space-4)' }}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'var(--space-3)' }}>
        {[
          { label: 'Win Rate',    value: `${stats.winRate}%`,         color: stats.winRate >= 55 ? 'var(--green)' : stats.winRate >= 45 ? 'var(--amber)' : 'var(--red)' },
          { label: 'Total Trades', value: `${stats.total}`,           color: 'var(--text)' },
          { label: 'Total P&L',   value: fmt(stats.pnl),              color: stats.pnl >= 0 ? 'var(--green)' : 'var(--red)' },
          { label: 'Avg Win',     value: `+$${stats.avgWin.toFixed(2)}`, color: 'var(--green)' },
          { label: 'Avg Loss',    value: `-$${stats.avgLoss.toFixed(2)}`, color: 'var(--red)' },
          { label: 'Session',     value: `${sessionDuration}m`,       color: 'var(--text-muted)' },
        ].map(s => (
          <div key={s.label} className="stat-card">
            <div className="stat-label">{s.label}</div>
            <div className="stat-value mono" style={{ color: s.color, fontSize:'var(--text-lg)' }}>{s.value}</div>
          </div>
        ))}
      </div>

      <div className="card" style={{ padding:'var(--space-4)' }}>
        <div style={{ fontWeight:600, fontSize:'var(--text-sm)', marginBottom:'var(--space-3)' }}>Cumulative P&L</div>
        <PnLChart trades={trades}/>
        <div style={{ display:'flex', justifyContent:'space-between', marginTop:'var(--space-2)', fontSize:'var(--text-xs)', color:'var(--text-faint)' }}>
          <span>{stats.losses} losses</span>
          <span>{stats.wins} wins</span>
        </div>
      </div>

      {/* Win/loss bar */}
      {stats.total > 0 && (
        <div className="card" style={{ padding:'var(--space-4)' }}>
          <div style={{ fontWeight:600, fontSize:'var(--text-sm)', marginBottom:'var(--space-3)' }}>Win/Loss Split</div>
          <div style={{ height:12, background:'var(--red-dim)', borderRadius:'var(--radius-full)', overflow:'hidden' }}>
            <div style={{ height:'100%', width:`${stats.winRate}%`, background:'var(--green)', borderRadius:'var(--radius-full)', transition:'width 0.5s ease' }}/>
          </div>
          <div style={{ display:'flex', justifyContent:'space-between', marginTop:'var(--space-2)', fontSize:'var(--text-xs)' }}>
            <span className="text-green">{stats.wins} wins ({stats.winRate}%)</span>
            <span className="text-red">{stats.losses} losses ({100 - stats.winRate}%)</span>
          </div>
        </div>
      )}

      {/* Strategy breakdown */}
      {trades.length > 0 && (() => {
        const byStrat = {};
        trades.forEach(t => {
          if (!byStrat[t.strategy]) byStrat[t.strategy] = { wins:0, total:0, pnl:0 };
          byStrat[t.strategy].total++;
          if (t.outcome === 'win') byStrat[t.strategy].wins++;
          byStrat[t.strategy].pnl += t.profit;
        });
        return (
          <div className="card" style={{ padding:'var(--space-4)' }}>
            <div style={{ fontWeight:600, fontSize:'var(--text-sm)', marginBottom:'var(--space-3)' }}>Strategy Breakdown</div>
            <div style={{ display:'flex', flexDirection:'column', gap:'var(--space-2)' }}>
              {Object.entries(byStrat).map(([strat, data]) => (
                <div key={strat} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'var(--space-2) var(--space-3)', background:'var(--surface-3)', borderRadius:'var(--radius-lg)' }}>
                  <span style={{ fontSize:'var(--text-xs)', fontWeight:600 }}>{strat}</span>
                  <div style={{ display:'flex', gap:'var(--space-3)', fontSize:'var(--text-xs)' }}>
                    <span style={{ color:'var(--text-muted)' }}>{data.total} trades</span>
                    <span className={Math.round(data.wins/data.total*100) >= 50 ? 'text-green' : 'text-red'}>{Math.round(data.wins/data.total*100)}% WR</span>
                    <span className={`mono ${data.pnl >= 0 ? 'text-green' : 'text-red'}`}>{fmt(data.pnl)}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}
    </section>
  );
}

/* ══════════════════════════════════════════════════════════════════
   SIDEBAR (desktop)
══════════════════════════════════════════════════════════════════ */
function Sidebar({ active, onChange }) {
  const items = [
    { id: 'Dashboard', icon: Icon.Dashboard },
    { id: 'Trades',    icon: Icon.Trades },
    { id: 'Strategy',  icon: Icon.Strategy },
    { id: 'Settings',  icon: Icon.Settings },
    { id: 'Stats',     icon: Icon.Stats },
  ];
  return (
    <aside className="card" style={{ padding:'var(--space-3)', position:'sticky', top:'var(--space-4)' }}>
      <div style={{ display:'flex', flexDirection:'column', gap:'var(--space-1)' }}>
        {items.map(({ id, icon: Ic }) => (
          <button key={id} className={`sidebar-btn ${active === id ? 'active' : ''}`} onClick={() => onChange(id)}>
            <Ic/> {id}
          </button>
        ))}
      </div>
    </aside>
  );
}

/* ══════════════════════════════════════════════════════════════════
   BOTTOM NAV (mobile)
══════════════════════════════════════════════════════════════════ */
function BottomNav({ active, onChange }) {
  const items = [
    { id: 'Dashboard', icon: Icon.Dashboard, label: 'Home' },
    { id: 'Trades',    icon: Icon.Trades,    label: 'Trades' },
    { id: 'Strategy',  icon: Icon.Strategy,  label: 'Strategy' },
    { id: 'Settings',  icon: Icon.Settings,  label: 'Settings' },
    { id: 'Stats',     icon: Icon.Stats,     label: 'Stats' },
  ];
  return (
    <nav className="bottom-nav" role="navigation" aria-label="Main navigation">
      {items.map(({ id, icon: Ic, label }) => (
        <button key={id} className={`nav-btn ${active === id ? 'active' : ''}`} onClick={() => onChange(id)} aria-label={id} aria-current={active === id ? 'page' : undefined}>
          <Ic/> <span>{label}</span>
        </button>
      ))}
    </nav>
  );
}

/* ══════════════════════════════════════════════════════════════════
   TOAST STACK
══════════════════════════════════════════════════════════════════ */
function ToastStack({ toasts }) {
  return (
    <div className="toast-stack" role="status" aria-live="polite">
      {toasts.map(t => (
        <div key={t.id} className={`toast toast-${t.level}`}>
          <span>{ t.level === 'success' ? '✓' : t.level === 'error' ? '✗' : t.level === 'warn' ? '⚠' : 'ℹ' }</span>
          <span>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════
   TRADE DETAIL MODAL
══════════════════════════════════════════════════════════════════ */
function TradeModal({ trade, onClose }) {
  if (!trade) return null;
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()} role="dialog" aria-modal="true" aria-label="Trade details">
      <div className="card modal-content" style={{ width:'100%', maxWidth:420, padding:'var(--space-5)' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'var(--space-4)' }}>
          <span style={{ fontWeight:700, fontSize:'var(--text-lg)' }}>Trade Detail</span>
          <button className="btn btn-ghost btn-icon btn-sm" onClick={onClose} aria-label="Close">✕</button>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:'var(--space-3)' }}>
          {[
            ['Direction', trade.direction],
            ['Outcome', trade.outcome.toUpperCase()],
            ['Profit/Loss', fmt(trade.profit)],
            ['Stake', `$${trade.stake?.toFixed(2) || '—'}`],
            ['Entry Spot', trade.entry || '—'],
            ['Exit Spot', trade.exit || '—'],
            ['Strategy', trade.strategy],
            ['Time', trade.timestamp],
          ].map(([k, v]) => (
            <div key={k} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'var(--space-2) var(--space-3)', background:'var(--surface-3)', borderRadius:'var(--radius-lg)' }}>
              <span style={{ fontSize:'var(--text-xs)', color:'var(--text-muted)', fontWeight:500 }}>{k}</span>
              <span className="mono" style={{ fontSize:'var(--text-sm)', fontWeight:600, color: k === 'Profit/Loss' ? (trade.profit >= 0 ? 'var(--green)' : 'var(--red)') : 'var(--text)' }}>{v}</span>
            </div>
          ))}
        </div>
        <button className="btn btn-primary" style={{ width:'100%', marginTop:'var(--space-4)' }} onClick={onClose}>Close</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════════════════ */
function App() {
  const bot = useMarsBot();
  const [activePanel, setActivePanel] = useState('Dashboard');
  const [theme, setTheme] = useState('dark');

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

  const renderPanel = (view) => {
    switch (view) {
      case 'Trades':   return <TradesPanel   trades={bot.trades} onReplay={bot.setSelectedTrade} onClear={bot.clearTrades}/>;
      case 'Strategy': return <StrategyPanel prefs={bot.prefs} updatePref={bot.updatePref} signal={bot.signal}/>;
      case 'Settings': return <SettingsPanel prefs={bot.prefs} updatePref={bot.updatePref} applyProfile={bot.applyProfile}/>;
      case 'Stats':    return <StatsPanel    stats={bot.stats} trades={bot.trades} sessionStart={bot.sessionStart}/>;
      default:         return <DashboardPanel signal={bot.signal} logs={bot.logs} prices={bot.prices} onManualTrade={bot.placeTrade} openContract={bot.openContract} stats={bot.stats} running={bot.running}/>;
    }
  };

  return (
    <>
      <a href="#main-content" className="sr-only" style={{ position:'absolute', top:8, left:8, zIndex:999, background:'var(--primary)', color:'#fff', padding:'var(--space-2) var(--space-4)', borderRadius:'var(--radius-md)' }}>
        Skip to content
      </a>

      <div>
        <TopBar
          running={bot.running}
          setRunning={bot.setRunning}
          conn={bot.conn}
          balance={bot.balance}
          onConnect={bot.connect}
          onDisconnect={bot.disconnect}
          dailyPnl={bot.dailyPnl}
          theme={theme}
          onThemeToggle={toggleTheme}
        />

        {/* Desktop layout */}
        <div className="desktop-layout">
          <Sidebar active={activePanel} onChange={setActivePanel}/>
          <main id="desktop-main">{renderPanel(activePanel)}</main>
          <aside style={{ display:'flex', flexDirection:'column', gap:'var(--space-4)', position:'sticky', top:'var(--space-4)' }}>
            <TradesPanel trades={bot.trades.slice(0, 20)} onReplay={bot.setSelectedTrade} onClear={bot.clearTrades}/>
            <StatsPanel stats={bot.stats} trades={bot.trades} sessionStart={bot.sessionStart}/>
          </aside>
        </div>

        {/* Mobile layout */}
        <main id="main-content" className="mobile-only">
          {renderPanel(activePanel)}
        </main>
      </div>

      <BottomNav active={activePanel} onChange={setActivePanel}/>
      <TradeModal trade={bot.selectedTrade} onClose={() => bot.setSelectedTrade(null)}/>
      <ToastStack toasts={bot.toasts}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
