<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarsBot V8 - AI Optimised</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#0A0A0A; color:white; font-family:sans-serif; }
canvas { width:100%; }
</style>
</head>

<body>
<div class="max-w-6xl mx-auto p-4">

<h1 class="text-2xl font-bold mb-4">MarsBot V8 (AI + Optimiser)</h1>

<input id="apiToken" placeholder="Deriv API Token"
class="w-full p-2 bg-black border mb-3">

<button onclick="connectDeriv()" class="bg-blue-500 px-4 py-2 rounded mb-4">
Connect
</button>

<div class="flex gap-2 mb-4">
<button onclick="toggleBot()" class="bg-green-500 px-4 py-2 rounded">Start</button>

<select id="martingaleToggle" class="bg-black border px-2">
<option value="on">Martingale ON</option>
<option value="off">Martingale OFF</option>
</select>
</div>

<canvas id="chart" height="120"></canvas>

<div class="grid grid-cols-2 gap-3 mt-4">
<div>Trades: <span id="totalTrades">0</span></div>
<div>Win Rate: <span id="winRate">0%</span></div>
<div>Profit: <span id="profit">$0</span></div>
<div>Loss: <span id="dailyLoss">$0</span></div>
<div>Mode: <span id="modeStatus">NORMAL</span></div>
<div>AI Confidence: <span id="aiConfidence">0</span></div>
</div>

</div>

<script>
// ===== STATE =====
let ws, isRunning=false, isConnected=false, isTradeOpen=false;
let prices=[], lastTradeTime=0;

// ===== CONFIG =====
let config={
  stake:1,
  maxStake:100,
  martingale:true,
  step:0,
  maxSteps:2,
  multiplier:1.5,
  cooldown:5000,
  lossLimit:30
};

// ===== AI =====
let ai={
  patterns:{},
  lr:0.1,
  confidenceThreshold:0
};

// ===== OPTIMISER =====
let optimiser={
  rsiBuy:35,
  rsiSell:65,
  volMin:0.2,

  adjust(performance){
    if(performance<0){
      this.rsiBuy+=1;
      this.rsiSell-=1;
      this.volMin+=0.01;
      ai.confidenceThreshold+=0.1;
    } else {
      this.rsiBuy=Math.max(25,this.rsiBuy-1);
      this.rsiSell=Math.min(75,this.rsiSell+1);
      this.volMin=Math.max(0.1,this.volMin-0.01);
      ai.confidenceThreshold=Math.max(0,ai.confidenceThreshold-0.05);
    }
  }
};

// ===== METRICS =====
let metrics={
  trades:0,wins:0,profit:0,loss:0,mode:"NORMAL"
};

// ===== CONNECT =====
function connectDeriv(){
  let token=apiToken.value;

  ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

  ws.onopen=()=>ws.send(JSON.stringify({authorize:token}));

  ws.onmessage=(msg)=>{
    let d=JSON.parse(msg.data);

    if(d.authorize){
      isConnected=true;
      subscribeTicks();
    }

    if(d.tick){
      prices.push(d.tick.quote);
      if(prices.length>100) prices.shift();
      drawChart();
      if(isRunning) runBot();
    }

    if(d.buy){
      isTradeOpen=true;
      subscribeContract(d.buy.contract_id);
    }

    if(d.proposal_open_contract && d.proposal_open_contract.is_sold){
      handleResult(d.proposal_open_contract);
      isTradeOpen=false;
    }
  };
}

function subscribeTicks(){
  ws.send(JSON.stringify({ticks:"R_50",subscribe:1}));
}

function subscribeContract(id){
  ws.send(JSON.stringify({
    proposal_open_contract:1,
    contract_id:id,
    subscribe:1
  }));
}

// ===== INDICATORS =====
function EMA(p,d){
  let k=2/(p+1), e=d[0];
  for(let i=1;i<d.length;i++) e=d[i]*k+e*(1-k);
  return e;
}

function RSI(d,p=14){
  let g=0,l=0;
  for(let i=d.length-p;i<d.length-1;i++){
    let diff=d[i+1]-d[i];
    if(diff>0) g+=diff; else l-=diff;
  }
  return 100-(100/(1+(g/(l||1))));
}

// ===== AI PATTERN =====
function pattern(){
  return prices.slice(-5).map(p=>Math.round(p)).join("-");
}

// ===== SIGNAL =====
function getSignal(){
  if(prices.length<30) return null;

  let emaF=EMA(9,prices);
  let emaS=EMA(21,prices);
  let rsi=RSI(prices);
  let vol=Math.abs(prices.at(-1)-prices.at(-2));

  if(vol<optimiser.volMin) return null;

  if(rsi<optimiser.rsiBuy && emaF>emaS) return "CALL";
  if(rsi>optimiser.rsiSell && emaF<emaS) return "PUT";

  return null;
}

// ===== BOT =====
function runBot(){
  if(isTradeOpen) return;

  let now=Date.now();
  if(now-lastTradeTime<config.cooldown) return;

  if(metrics.loss>=config.lossLimit){
    metrics.mode="STOPPED";
    isRunning=false;
    updateUI();
    return;
  }

  let sig=getSignal();
  if(!sig) return;

  let pat=pattern();
  let mem=ai.patterns[pat]||{win:0,loss:0};
  let confidence=mem.win-mem.loss;

  aiConfidence.innerText=confidence.toFixed(2);

  if(confidence < ai.confidenceThreshold) return;

  placeTrade(sig);
  lastTradeTime=now;
}

// ===== TRADE =====
function placeTrade(dir){
  ws.send(JSON.stringify({
    buy:1,
    price:config.stake,
    parameters:{
      amount:config.stake,
      basis:"stake",
      contract_type:dir,
      currency:"USD",
      duration:1,
      duration_unit:"m",
      symbol:"R_50"
    }
  }));
}

// ===== RESULT =====
function handleResult(c){
  let p=c.profit;

  metrics.trades++;
  if(p>0) metrics.wins++;

  metrics.profit+=p;
  metrics.loss=Math.max(0,metrics.loss+p);

  let pat=pattern();
  if(!ai.patterns[pat]) ai.patterns[pat]={win:0,loss:0};

  if(p>0) ai.patterns[pat].win+=ai.lr;
  else ai.patterns[pat].loss+=ai.lr;

  optimiser.adjust(p);

  updateUI();
}

// ===== CHART =====
function drawChart(){
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  if(prices.length<2) return;

  let max=Math.max(...prices), min=Math.min(...prices);
  let range=max-min||1;

  ctx.beginPath();
  prices.forEach((p,i)=>{
    let x=(i/prices.length)*c.width;
    let y=c.height-((p-min)/range)*c.height;
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.stroke();
}

// ===== UI =====
function updateUI(){
  totalTrades.innerText=metrics.trades;
  winRate.innerText=metrics.trades?((metrics.wins/metrics.trades)*100).toFixed(1)+"%":"0%";
  profit.innerText="$"+metrics.profit.toFixed(2);
  dailyLoss.innerText="$"+metrics.loss.toFixed(2);
  modeStatus.innerText=metrics.mode;
}

// ===== CONTROL =====
function toggleBot(){
  if(metrics.mode!=="STOPPED") isRunning=!isRunning;
}

martingaleToggle.onchange=e=>{
  config.martingale=e.target.value==="on";
};
</script>
</body>
</html>
